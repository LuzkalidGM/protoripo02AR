<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #f2f2f2;
    }
  </style>
</head>

<body>

  <model-viewer
    src="casa.glb"
    ar
    ar-modes="scene-viewer webxr"
    ar-placement="floor"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="Casa 3D en realidad aumentada">
  </model-viewer>

</body>
</html>
