<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    .ar-button {
      background: #ffffff;
      border-radius: 10px;
      border: none;
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 22px;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      z-index: 10;
    }
  </style>
</head>

<body>

  <model-viewer
    src="casa.glb"
    ar
    ar-modes="scene-viewer"
    ar-placement="floor"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    alt="Casa 3D en realidad aumentada">

    <button slot="ar-button" class="ar-button">
      Ver casa en AR
    </button>

  </model-viewer>

</body>
</html>
